name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-core:
    name: Test masonry-core
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install masonry-core + dev deps
        working-directory: packages/core
        run: |
          pip install -e ".[dev]"

      - name: Lint (ruff)
        working-directory: packages/core
        run: ruff check masonry_core

      - name: Type-check (mypy)
        working-directory: packages/core
        run: mypy masonry_core

      - name: Run tests
        working-directory: packages/core
        run: pytest --cov=masonry_core --cov-report=xml -v

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: packages/core/coverage.xml
          flags: masonry-core

  test-gatekeeper:
    name: Test masonry-gatekeeper
    runs-on: ubuntu-latest
    needs: test-core

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e packages/core
          pip install fastapi uvicorn httpx pydantic pytest pytest-asyncio httpx

      - name: Run gatekeeper smoke tests
        run: |
          python -c "
          from masonry_gatekeeper.main import app
          from fastapi.testclient import TestClient
          client = TestClient(app)
          r = client.get('/health')
          assert r.status_code == 200
          r = client.get('/contracts')
          assert r.status_code == 200
          print('Gatekeeper smoke tests passed.')
ci: add GitHub Actions workflow with test/lint/mypy/docker jobs        env:
          PYTHONPATH: packages/gatekeeper

  docker-build:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: [test-core, test-gatekeeper]

    steps:
      - uses: actions/checkout@v4

      - name: Build gatekeeper image
        run: docker build -f packages/gatekeeper/Dockerfile . -t masonry-gatekeeper:test

      - name: Build engine image
        run: docker build -f packages/engine/Dockerfile . -t masonry-engine:test

      - name: Smoke-test containers
        run: |
          docker run -d --name engine -p 8001:8001 masonry-engine:test
          sleep 5
          curl -f http://localhost:8001/health
          docker stop engine
