name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Core library — lint, type-check, tests, coverage
  # ---------------------------------------------------------------------------
  test-core:
    name: Test masonry-core (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install masonry-core + dev deps
        working-directory: packages/core
        run: |
          pip install -e ".[dev]"

      - name: Lint (ruff)
        working-directory: packages/core
        run: ruff check .

      - name: Type-check (mypy)
        working-directory: packages/core
        run: mypy masonry_core

      - name: Security scan — SAST (bandit)
        working-directory: packages/core
        run: |
          pip install bandit
          bandit -r masonry_core -ll -ii

      - name: Security scan — dependency CVEs (safety)
        working-directory: packages/core
        run: |
          pip install safety
          safety check --full-report
        continue-on-error: true  # advisory only; CI does not block on this

      - name: Run tests + coverage
        working-directory: packages/core
        run: |
          pytest tests/ -v --cov=masonry_core --cov-report=xml --cov-fail-under=80

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: packages/core/coverage.xml
          flags: core-py${{ matrix.python-version }}

  # ---------------------------------------------------------------------------
  # Job 2: Gatekeeper — smoke test + security scan
  # ---------------------------------------------------------------------------
  test-gatekeeper:
    name: Test masonry-gatekeeper
    runs-on: ubuntu-latest
    needs: test-core

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install gatekeeper deps
        working-directory: packages/gatekeeper
        run: |
          pip install -e ../core
          pip install -e ".[dev]"

      - name: Security scan (bandit)
        working-directory: packages/gatekeeper
        run: |
          pip install bandit
          bandit -r masonry_gatekeeper -ll

      - name: Smoke test — app import
        working-directory: packages/gatekeeper
        run: python -c "from masonry_gatekeeper.proxy import app; print('Gatekeeper OK')"

      - name: Performance benchmark — /health latency
        working-directory: packages/gatekeeper
        run: |
          pip install httpx uvicorn
          python - <<'EOF'
          import subprocess, time, httpx, sys

          proc = subprocess.Popen(
              ["uvicorn", "masonry_gatekeeper.proxy:app", "--port", "9999"],
              stdout=subprocess.PIPE, stderr=subprocess.PIPE
          )
          time.sleep(3)  # wait for startup
          try:
              t0 = time.perf_counter()
              for _ in range(100):
                  r = httpx.get("http://localhost:9999/health")
                  assert r.status_code == 200
              elapsed = (time.perf_counter() - t0) / 100 * 1000
              print(f"Average /health latency: {elapsed:.2f} ms")
              if elapsed > 50:
                  print(f"WARNING: latency {elapsed:.2f}ms > 50ms SLA", file=sys.stderr)
                  sys.exit(1)
          finally:
              proc.terminate()
          EOF

  # ---------------------------------------------------------------------------
  # Job 3: Contract schema evolution guard
  # ---------------------------------------------------------------------------
  contract-schema-guard:
    name: Contract breaking-change detection
    runs-on: ubuntu-latest
    needs: test-core

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for diff

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install masonry-core
        working-directory: packages/core
        run: pip install -e .

      - name: Export current contract schemas
        working-directory: packages/core
        run: |
          python - <<'EOF'
          import json
          from masonry_core.contracts import CONTRACT_REGISTRY
          schemas = {name: cls.model_json_schema() for name, cls in CONTRACT_REGISTRY.items()}
          with open("/tmp/schemas_current.json", "w") as f:
              json.dump(schemas, f, indent=2)
          print(json.dumps(schemas, indent=2))
          EOF

      - name: Check schemas against main branch baseline
        run: |
          # On PRs: compare exported schema against main branch version
          # Fails if required fields are removed (breaking change)
          git stash
          pip install -e packages/core -q
          python - <<'EOF'
          import json, subprocess, sys
          from masonry_core.contracts import CONTRACT_REGISTRY

          schemas_main = {name: cls.model_json_schema() for name, cls in CONTRACT_REGISTRY.items()}
          with open("/tmp/schemas_current.json") as f:
              schemas_pr = json.load(f)

          breaking = []
          for contract, schema_main in schemas_main.items():
              if contract not in schemas_pr:
                  breaking.append(f"Contract '{contract}' removed in PR")
                  continue
              required_main = set(schema_main.get("required", []))
              required_pr = set(schemas_pr[contract].get("required", []))
              removed = required_main - required_pr
              if removed:
                  breaking.append(f"Contract '{contract}': required fields removed: {removed}")

          if breaking:
              print("BREAKING CONTRACT CHANGES DETECTED:", file=sys.stderr)
              for b in breaking:
                  print(f"  - {b}", file=sys.stderr)
              sys.exit(1)
          else:
              print("Contract schema guard: no breaking changes detected.")
          EOF
        continue-on-error: true  # warn only on initial setup

  # ---------------------------------------------------------------------------
  # Job 4: Docker build
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker build (multi-stage)
    runs-on: ubuntu-latest
    needs: [test-core, test-gatekeeper]

    steps:
      - uses: actions/checkout@v4

      - name: Build Gatekeeper image
        run: docker build -t masonry-gatekeeper:ci ./packages/gatekeeper

      - name: Build Engine image
        run: docker build -t masonry-engine:ci ./packages/engine

      - name: Smoke-test containers
        run: |
          docker run -d --name gk -p 8000:8000 \
            -e MASONRY_API_KEYS=ci-key masonry-gatekeeper:ci
          docker run -d --name eng -p 8001:8001 masonry-engine:ci
          sleep 5
          curl -sf http://localhost:8000/health | grep '"ok"'
          curl -sf http://localhost:8001/health | grep '"ok"'
          docker stop gk eng
          docker rm gk eng
