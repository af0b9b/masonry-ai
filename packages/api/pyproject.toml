[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "masonry-api"
version = "0.1.0"
description = "MASONRY.AI API — tenancy, users and immutable audit API"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "fastapi>=0.110",
  "uvicorn[standard]>=0.29",
  "pydantic>=2.0,<3.0",
]

[tool.hatch.build.targets.wheel]
packages = ["masonry_api"]
