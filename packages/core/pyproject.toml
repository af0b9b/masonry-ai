[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "masonry-core"
version = "0.1.0"
description = "Open-source privacy primitives for MASONRY.AI – contracts, DP filters, k-anonymisation."
readme = "README.md"
license = { text = "AGPL-3.0-or-later" }
requires-python = ">=3.10"
keywords = ["privacy", "differential-privacy", "gdpr", "data-governance"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: GNU Affero General Public License v3 or later (AGPLv3+)",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Security",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "pydantic>=2.0",
    "numpy>=1.24",
    "opendp>=0.9; python_version>='3.10'",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov",
    "ruff",
    "mypy",
]

[project.urls]
Homepage = "https://masonry.ai"
Repository = "https://github.com/af0b9b/masonry-ai"
Issues = "https://github.com/af0b9b/masonry-ai/issues"

[tool.hatch.build.targets.wheel]
packages = ["masonry_core"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.mypy]
python_version = "3.10"
strict = true
ignore_missing_imports = true
