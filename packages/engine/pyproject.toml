[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "masonry-engine"
version = "0.2.0"
description = "MASONRY.AI Engine — Layer 2 analytics engine with SQLAlchemy persistence"
readme = "README.md"
license = { text = "AGPL-3.0" }
requires-python = ">=3.10"
dependencies = [
    "fastapi>=0.110",
    "uvicorn[standard]>=0.29",
    "pydantic>=2.0,<3.0",
    "sqlalchemy>=2.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "httpx>=0.27",
    "ruff>=0.4",
    "mypy>=1.9",
    "bandit>=1.7",
]

[tool.hatch.build.targets.wheel]
packages = ["masonry_engine"]
